<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <title>EBS Rundown</title>
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..900&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Editorial Brutalism Palette */
      --bg: #F4F4F5;          /* Paper off-white */
      --surface: #FFFFFF;     /* Pure white */
      --surface-hover: #FAFAFA;
      
      --line: #D4D4D8;        /* Soft structural dividers */
      --hard-line: #09090B;   /* Brutalist deep black borders */
      
      --text: #09090B;        /* High-contrast Onyx Black */
      --muted: #52525B;       /* Secondary slate gray */
      --faint: #A1A1AA;       /* Tertiary metadata */
      
      /* Signal Accents */
      --ep-blue: #0055FF;     /* Sharp Cobalt for institutional links */
      --live-orange: #FF4400; /* Piercing Broadcast Orange */
      --new-green: #00C853;   /* Terminal Green for new items */
      
      /* Typography */
      --mono: "IBM Plex Mono", ui-monospace, monospace;
      --sans: "Archivo", system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: var(--sans); 
      font-size: 16px; 
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    /* Top Navigation Dashboard Bar */
    header { 
      position: sticky; 
      top: 0; 
      z-index: 10; 
      background: rgba(255, 255, 255, 0.96); 
      backdrop-filter: blur(8px); 
      border-bottom: 2px solid var(--hard-line); 
      padding: 16px 20px 14px;
    }
    
    .brand { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand h1 { 
      font-size: 18px; 
      font-weight: 900; 
      letter-spacing: -0.02em; 
      text-transform: uppercase;
      color: var(--hard-line);
    }
    .brand h1 span { color: var(--ep-blue); }

    /* Day Picker Controls - Sharp Edges */
    .daynav { display: flex; align-items: center; gap: 0; border: 1px solid var(--hard-line); border-radius: 2px; overflow: hidden; }
    .daynav button { 
      background: var(--surface); 
      border: none;
      border-left: 1px solid var(--hard-line);
      border-right: 1px solid var(--hard-line);
      color: var(--hard-line); 
      font-family: var(--mono); 
      font-size: 16px; 
      font-weight: 700;
      width: 36px; 
      height: 32px; 
      cursor: pointer; 
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .daynav button:first-child { border-left: none; }
    .daynav button:last-child { border-right: none; }
    .daynav button:hover:not(:disabled) { background: var(--hard-line); color: var(--surface); }
    .daynav button:disabled { background: #E4E4E7; color: #A1A1AA; cursor: default; }
    .daynav button:focus-visible { outline: 2px solid var(--ep-blue); outline-offset: -2px; }
    
    .daynav .day { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); min-width: 130px; text-align: center; background: var(--surface); line-height: 32px;}
    .daynav .day.today { color: var(--live-orange); font-weight: 700; }

    /* Filters and Timestamp Row */
    .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; gap: 12px; }
    .chips { display: flex; gap: -1px; }
    .chip { 
      font-family: var(--mono); 
      font-size: 11px; 
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 6px 14px; 
      border-radius: 0; 
      border: 1px solid var(--hard-line); 
      margin-left: -1px; /* Overlap borders */
      color: var(--muted); 
      background: var(--surface); 
      cursor: pointer;
      transition: all 0s;
    }
    .chip:first-child { margin-left: 0; border-top-left-radius: 2px; border-bottom-left-radius: 2px; }
    .chip:last-child { border-top-right-radius: 2px; border-bottom-right-radius: 2px; }
    .chip:hover { background: #F4F4F5; color: var(--text); z-index: 1; position: relative; }
    .chip[aria-pressed="true"] { color: var(--surface); background: var(--hard-line); z-index: 2; position: relative; }
    .chip:focus-visible { outline: 2px solid var(--ep-blue); z-index: 3; position: relative;}
    
    .updated { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--muted); text-align: right; text-transform: uppercase; }

    /* Core Layout */
    main { max-width: 680px; margin: 0 auto; padding: 0 20px 100px; }
    .tz { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--muted); padding: 16px 0 12px; text-align: right; text-transform: uppercase; border-bottom: 1px solid var(--line); margin-bottom: 12px;}
    
    /* Editorial Event Blocks */
    .event { display: grid; grid-template-columns: 60px 20px 1fr; gap: 0 16px; padding: 24px 0; position: relative; }
    .event + .event { border-top: 1px solid var(--line); }
    .event.past { opacity: 0.35; filter: grayscale(100%); }
    
    .time { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--hard-line); padding-top: 0; letter-spacing: -0.05em; }
    .dur { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--muted); margin-top: 4px; }
    
    /* Graphic Left Rail Timeline (Brutalist Squares) */
    .rail { position: relative; }
    .rail::before { content: ""; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--hard-line); }
    .node { position: absolute; left: 4px; top: 6px; width: 10px; height: 10px; border-radius: 0; background: var(--surface); border: 2px solid var(--hard-line); }
    
    .event.onair .node { background: var(--live-orange); border-color: var(--live-orange); }
    @media (prefers-reduced-motion: no-preference) {
      .event.onair .node { animation: pulse 2s ease-in-out infinite; }
      @keyframes pulse { 50% { outline: 4px solid rgba(255, 68, 0, 0.2); outline-offset: 2px; } }
    }
    
    /* Stark Badges and Tags */
    .flags { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .flag { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .08em; padding: 3px 6px; border-radius: 2px; text-transform: uppercase; }
    
    .flag.live { background: var(--live-orange); color: #fff; }
    .flag.rec { background: var(--surface); border: 1px solid var(--hard-line); color: var(--hard-line); }
    .flag.edit { background: transparent; border: 1px dashed var(--muted); color: var(--muted); }
    
    /* Channel Identifiers - Pure Typography & Contrast */
    .flag.ch-EBS { color: var(--surface); background: var(--hard-line); border: 1px solid var(--hard-line); }
    .flag.ch-EBSplus { color: var(--hard-line); background: var(--surface); border: 1px solid var(--hard-line); }
    
    /* EP Highlight Treatment (Subtle Gray/Blue) */
    .event.ep { background: linear-gradient(90deg, rgba(0, 85, 255, 0.03), transparent 85%); }
    .event.ep .rail::before { background: var(--ep-blue); opacity: 0.5; }
    .event.ep .node { border-color: var(--ep-blue); }
    .flag.epflag { color: var(--ep-blue); background: transparent; border: 1px solid var(--ep-blue); }
    
    .title { font-size: 20px; font-weight: 800; line-height: 1.25; letter-spacing: -0.02em; color: var(--hard-line); }
    .langs { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--muted); margin-top: 8px; word-spacing: 4px; }
    a.ref { font-family: var(--mono); font-size: 11px; color: var(--ep-blue); text-decoration: none; font-weight: 700; border-bottom: 1px solid transparent; transition: border-color 0.1s;}
    a.ref:hover { border-bottom: 1px solid var(--ep-blue); }
    
    /* Details Accordions - Left Border Indicator */
    details { margin-top: 16px; }
    summary { font-family: var(--mono); font-size: 12px; font-weight: 700; padding: 6px 0; color: var(--hard-line); cursor: pointer; list-style: none; user-select: none; text-transform: uppercase; border-bottom: 1px solid var(--line); display: inline-block;}
    summary:hover { color: var(--ep-blue); border-color: var(--ep-blue); }
    summary::before { content: "+ "; color: var(--muted); font-weight: bold; margin-right: 4px; display: inline-block; }
    details[open] summary::before { content: "— "; }
    summary:focus-visible { outline: 2px solid var(--ep-blue); outline-offset: 4px; }
    
    .sub { border-left: 2px solid var(--hard-line); padding-left: 16px; margin-top: 12px; }
    .sub > div { padding: 12px 0; }
    .sub > div + div { border-top: 1px solid var(--line); }
    .sub .inst { color: var(--faint); font-size: 11px; font-family: var(--mono); font-weight: 600; }
    .sub .ref { font-family: var(--mono); font-size: 11px; margin-bottom: 4px; display: inline-block; font-weight: 600; color: var(--muted);}
    .sub .st { font-size: 15px; font-weight: 700; color: var(--hard-line); line-height: 1.4; }
    .sub .ss { font-size: 14px; font-weight: 400; color: var(--muted); margin-top: 4px; line-height: 1.5; }
    
    /* Live Playhead Design - Razor Sharp */
    .playhead { display: grid; grid-template-columns: 60px 1fr; gap: 0 16px; align-items: center; padding: 8px 0; margin: 8px 0; }
    .playhead .now { font-family: var(--mono); font-size: 12px; font-weight: 800; color: var(--live-orange); letter-spacing: .08em; text-transform: uppercase; }
    .playhead .line { height: 2px; background: var(--live-orange); }
    
    /* Sharp New Entry Indicator */
    .newdot { display: inline-block; width: 8px; height: 8px; background: var(--new-green); margin-right: 10px; vertical-align: 3px; border-radius: 0; }
    
    .empty { padding: 80px 0; text-align: center; color: var(--muted); font-family: var(--mono); font-size: 14px; font-weight: 600; text-transform: uppercase; border-top: 1px dashed var(--line); border-bottom: 1px dashed var(--line); }
    
    footer { max-width: 680px; margin: 0 auto; padding: 0 20px 64px; font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--muted); line-height: 1.6; border-top: 2px solid var(--hard-line); padding-top: 24px; text-transform: uppercase;}
    footer a { color: var(--hard-line); text-decoration: none; border-bottom: 1px solid var(--hard-line); }
    footer a:hover { color: var(--ep-blue); border-color: var(--ep-blue); }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <h1>EBS <span>Rundown</span></h1>
    <div class="daynav">
      <button id="prev" aria-label="Previous day">‹</button>
      <span class="day" id="day"></span>
      <button id="next" aria-label="Next day">›</button>
    </div>
  </div>
  <div class="meta">
    <div class="chips" role="group" aria-label="Channel filter">
      <button class="chip" data-ch="ALL" aria-pressed="true">COMBINED</button>
      <button class="chip" data-ch="EBS" aria-pressed="false">EbS Main</button>
      <button class="chip" data-ch="EBS+" aria-pressed="false">EbS+</button>
    </div>
    <div class="updated" id="updated"></div>
  </div>
</header>

<main>
  <div class="tz">All times Brussels (CET/CEST)</div>
  <div id="list"></div>
</main>

<footer>
  Source: European Commission Audiovisual Service Data.<br>
  Independent curation tool. <a href="https://multimedia.europarl.europa.eu/en" target="_blank" rel="noopener">EP Multimedia Centre Links</a>.<br>
  <span style="opacity: 0.6;">For internal reference. Not an official European Parliament product.</span>
</footer>

<script>
(() => {
  const EMBEDDED = { "generatedAt": new Date().toISOString(), "events": [] };
  const TZ = "Europe/Brussels";
  const NEW_WINDOW_MS = 12 * 3600 * 1000;
  const NEW_FADE_MS = 150000;
  const NEW_HARD_CAP_MS = 3600000;

  const newShownAt = new Map();
  const newExpired = new Set();
  
  let pendingScroll = true;
  let pendingToday = false;
  let currentFeed = EMBEDDED;
  let currentFilter = "ALL";
  let dayIdx = 0;
  let availableDays = [];

  const evKey = (e) => `${e.start}|${e.channel}|${e.title}`;
  const dayKey = (d) => new Intl.DateTimeFormat("en-CA", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: TZ }).format(d);
  const fmtT = (d) => new Intl.DateTimeFormat("en-GB", { hour: "2-digit", minute: "2-digit", timeZone: TZ }).format(d);
  const fmtDayLong = (d) => new Intl.DateTimeFormat("en-GB", { weekday: "short", day: "2-digit", month: "short", timeZone: TZ }).format(d).toUpperCase();
  const esc = (s) => (s || "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const chName = (c) => c === "EBS" ? "EBS" : "EBS+";

  function durTxt(sec) {
    if (!sec) return "";
    const m = Math.round(sec / 60);
    return m >= 60 ? `${Math.floor(m / 60)}h${String(m % 60).padStart(2, "0")}` : `${m}′`;
  }

  function getStatusFlag(status) {
    if (status === "LIVE") return '<span class="flag live">LIVE</span>';
    if (status === "RECORDED" || status === "EDIT_RECORDED") return '<span class="flag rec">REC</span>';
    return '<span class="flag edit">EDIT</span>';
  }

  function createRefLine(s) {
    if (!s.ref) return "";
    const tag = s.inst ? ` <span class="inst">· ${esc(s.inst)}</span>` : "";
    if (s.mmc && s.mmc.startsWith("https://multimedia.europarl.europa.eu/")) {
      return `<div><a class="ref" href="${esc(s.mmc)}" target="_blank" rel="noopener">${esc(s.ref)} ↗</a>${tag}</div>`;
    }
    return `<div class="ref">${esc(s.ref)}${tag}</div>`;
  }

  function createSubItemsHTML(items, eventKey, isDetailsOpen) {
    const subs = (items || []).filter(s => s.title || s.summary);
    if (!subs.length) return "";
    const openAttr = isDetailsOpen ? "open" : "";
    const itemsHTML = subs.map(s => `
      <div>
        ${createRefLine(s)}
        <div class="st">${esc(s.title)}</div>
        ${s.summary && s.summary !== s.title ? `<div class="ss">${esc(s.summary)}</div>` : ""}
      </div>
    `).join("");

    return `
      <details ${openAttr} data-key="${esc(eventKey)}">
        <summary>${subs.length} Items</summary>
        <div class="sub">${itemsHTML}</div>
      </details>
    `;
  }

  function createEventHTML(e, now, isToday, openDetailsKeys) {
    const st = new Date(e.start);
    const en = new Date(st.getTime() + (e.durationSec || 0) * 1000);
    const onair = isToday && now >= st && now <= en && e.status === "LIVE";
    const past = en < now && !onair;
    
    let newDotHTML = "";
    if (e.firstSeen) {
      const k = evKey(e);
      const age = now - new Date(e.firstSeen);
      if (age >= 0 && age < NEW_WINDOW_MS && !newExpired.has(k)) {
        if (!newShownAt.has(k)) newShownAt.set(k, Date.now());
        const shownFor = Date.now() - newShownAt.get(k);
        const opacity = Math.max(0, 1 - shownFor / NEW_FADE_MS);
        if (opacity <= 0.02 || shownFor >= NEW_HARD_CAP_MS) {
          newExpired.add(k);
        } else {
          newDotHTML = `<span class="newdot" style="opacity:${opacity.toFixed(2)}" aria-label="New broadcast entry"></span>`;
        }
      }
    }

    const cls = `event${past ? " past" : ""}${onair ? " onair" : ""}${e.ep ? " ep" : ""}`;
    const epFlag = e.ep ? '<span class="flag epflag">EP</span>' : "";
    const langHTML = e.languages && e.languages.length > 1 ? `<div class="langs">${e.languages.join(" · ")}</div>` : "";
    const eventKey = evKey(e);
    const isDetailsOpen = openDetailsKeys.has(eventKey);

    return `
      <article class="${cls}">
        <div>
          <div class="time">${fmtT(st)}</div>
          <div class="dur">${durTxt(e.durationSec)}</div>
        </div>
        <div class="rail"><span class="node"></span></div>
        <div>
          <div class="flags">
            ${getStatusFlag(e.status)}
            <span class="flag ch-${e.channel === "EBS" ? "EBS" : "EBSplus"}">${chName(e.channel)}</span>
            ${epFlag}
          </div>
          <div class="title">${newDotHTML}${esc(e.title)}</div>
          ${langHTML}
          ${createSubItemsHTML(e.items, eventKey, isDetailsOpen)}
        </div>
      </article>
    `;
  }

  function rebuildDays() {
    availableDays = [...new Set(currentFeed.events.map(e => dayKey(new Date(e.start))))].sort();
    const todayK = dayKey(new Date());
    const want = availableDays.indexOf(todayK);
    dayIdx = want >= 0 ? want : 0;
  }

  function render() {
    const now = new Date();
    const todayK = dayKey(now);
    const selKey = availableDays[dayIdx];
    
    const evs = currentFeed.events.filter(e =>
      dayKey(new Date(e.start)) === selKey &&
      (currentFilter === "ALL" || chName(e.channel) === currentFilter)
    );
    const isToday = selKey === todayK;

    const dayEl = document.getElementById("day");
    if (selKey) {
      dayEl.textContent = fmtDayLong(new Date(selKey + "T12:00:00Z")) + (isToday ? " (TODAY)" : "");
      dayEl.classList.toggle("today", isToday);
    }
    document.getElementById("prev").disabled = dayIdx <= 0;
    document.getElementById("next").disabled = dayIdx >= availableDays.length - 1;
    if (currentFeed.generatedAt) {
      document.getElementById("updated").textContent = "SYNC: " + fmtT(new Date(currentFeed.generatedAt));
    }

    const list = document.getElementById("list");
    const openDetailsKeys = new Set(
      Array.from(list.querySelectorAll("details[open]")).map(d => d.dataset.key)
    );

    if (!evs.length) {
      list.innerHTML = '<div class="empty">No transmission events scheduled.</div>';
      return;
    }

    let html = "";
    let playheadPlaced = !isToday;
    const playheadHTML = `<div class="playhead" aria-label="Current operational minute"><span class="now">${fmtT(now)} ►</span><span class="line"></span></div>`;

    for (const e of evs) {
      const st = new Date(e.start);
      if (!playheadPlaced && st > now) {
        html += playheadHTML;
        playheadPlaced = true;
      }
      html += createEventHTML(e, now, isToday, openDetailsKeys);
    }
    
    if (isToday && !playheadPlaced) html += playheadHTML;
    list.innerHTML = html;

    if (pendingScroll) {
      pendingScroll = false;
      if (isToday) {
        const ph = list.querySelector(".playhead");
        if (ph) ph.scrollIntoView({ block: "center" });
      }
    }
  }

  async function refresh() {
    try {
      const r = await fetch(`feed.json?t=${Date.now()}`, { cache: "no-store" });
      if (r.ok) {
        const sel = availableDays[dayIdx];
        currentFeed = await r.json();
        rebuildDays();
        if (pendingToday) {
          pendingToday = false;
        } else {
          const keep = availableDays.indexOf(sel);
          if (keep >= 0) dayIdx = keep;
        }
      }
    } catch (_) {}
    render();
  }

  document.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", () => {
      currentFilter = btn.dataset.ch;
      document.querySelectorAll(".chip").forEach(x => x.setAttribute("aria-pressed", x === btn ? "true" : "false"));
      render();
    });
  });

  document.getElementById("prev").addEventListener("click", () => {
    if (dayIdx > 0) { dayIdx--; render(); }
  });

  document.getElementById("next").addEventListener("click", () => {
    if (dayIdx < availableDays.length - 1) { dayIdx++; render(); }
  });

  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
      pendingScroll = true;
      pendingToday = true;
      newShownAt.clear();
      newExpired.clear();
      refresh();
    }
  });

  rebuildDays();
  refresh();
  
  setInterval(refresh, 5 * 60 * 1000);
  setInterval(render, 60 * 1000);
})();
</script>
</body>
</html>
