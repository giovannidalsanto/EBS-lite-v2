<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0A0F24">
  <title>EBS Rundown</title>
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0A0F24; --surface: #131B35; --surface-hover: #1E294B;
      --line: #222F56; --text: #F1F5F9; --muted: #94A3B8; --faint: #64748B;
      --ep-blue: #0044CC; --ep-gold: #FFCC00; --ebs: #3B82F6; --ebsplus: #A78BFA; --red: #EF4444;
      --mono: "IBM Plex Mono", ui-monospace, monospace;
      --sans: "Archivo", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 16px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    header { position: sticky; top: 0; z-index: 10; background: rgba(10, 15, 36, 0.94); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); border-top: 4px solid var(--ep-blue); padding: 14px 20px 12px; }
    .brand { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand h1 { font-size: 14px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; color: var(--text); }
    .brand h1 span { color: var(--ep-gold); }
    .daynav { display: flex; align-items: center; gap: 4px; }
    .daynav button { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 15px; font-weight: 600; width: 32px; height: 30px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .daynav button:hover:not(:disabled) { background: var(--surface-hover); border-color: var(--muted); }
    .daynav button:disabled { opacity: .25; cursor: default; }
    .daynav button:focus-visible { outline: 2px solid var(--ep-gold); outline-offset: 2px; }
    .daynav .day { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); min-width: 120px; text-align: center; }
    .daynav .day.today { color: var(--ep-gold); font-weight: 600; }
    .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; gap: 12px; }
    .chips { display: flex; gap: 6px; }
    .chip { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.03em; padding: 5px 12px; border-radius: 4px; border: 1px solid var(--line); color: var(--muted); background: transparent; cursor: pointer; transition: all 0.15s ease; }
    .chip:hover { border-color: var(--faint); color: var(--text); }
    .chip[aria-pressed="true"] { color: var(--bg); border-color: var(--ep-gold); background: var(--ep-gold); }
    .chip:focus-visible { outline: 2px solid var(--ep-gold); outline-offset: 2px; }
    .updated { font-family: var(--mono); font-size: 11px; color: var(--faint); text-align: right; }
    main { max-width: 640px; margin: 0 auto; padding: 0 20px 100px; }
    .tz { font-family: var(--mono); font-size: 11px; color: var(--faint); padding: 16px 0 8px; text-align: right; }
    .event { display: grid; grid-template-columns: 56px 16px 1fr; gap: 0 14px; padding: 18px 0; position: relative; }
    .event + .event { border-top: 1px solid var(--line); }
    .event.past { opacity: .35; }
    .time { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--text); padding-top: 1px; }
    .dur { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 4px; }
    .rail { position: relative; }
    .rail::before { content: ""; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: var(--line); }
    .node { position: absolute; left: 3px; top: 7px; width: 10px; height: 10px; border-radius: 50%; background: var(--bg); border: 2px solid var(--muted); }
    .event.onair .node { background: var(--red); border-color: var(--red); }
    @media (prefers-reduced-motion: no-preference) {
      .event.onair .node { animation: pulse 2s ease-in-out infinite; }
      @keyframes pulse { 50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0.25); } }
    }
    .flags { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
    .flag { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .06em; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }
    .flag.live { background: var(--red); color: #fff; }
    .flag.rec { background: var(--surface); border: 1px solid var(--line); color: var(--muted); }
    .flag.edit { background: transparent; border: 1px solid var(--line); color: var(--faint); }
    .flag.ch-EBS { color: var(--ebs); background: rgba(59, 130, 246, 0.12); border: 1px solid rgba(59, 130, 246, 0.3); }
    .flag.ch-EBSplus { color: var(--ebsplus); background: rgba(167, 139, 250, 0.12); border: 1px solid rgba(167, 139, 250, 0.3); }
    .event.ep { background: linear-gradient(90deg, rgba(255, 204, 0, 0.03), transparent 85%); }
    .event.ep .rail::before { background: rgba(255, 204, 0, 0.4); }
    .event.ep .node { border-color: var(--ep-gold); background: var(--ep-gold); }
    .flag.epflag { color: var(--ep-gold); background: rgba(255, 204, 0, 0.1); border: 1px solid rgba(255, 204, 0, 0.4); }
    .title { font-size: 16px; font-weight: 600; line-height: 1.4; letter-spacing: -0.01em; color: var(--text); }
    .langs { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 6px; word-spacing: 2px; }
    a.ref { font-family: var(--mono); font-size: 11px; color: var(--ebs); text-decoration: none; font-weight: 500; }
    a.ref:hover { text-decoration: underline; color: #60a5fa; }
    details { margin-top: 10px; background: var(--surface); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
    summary { font-family: var(--mono); font-size: 11.5px; font-weight: 500; padding: 8px 12px; color: var(--muted); cursor: pointer; list-style: none; user-select: none; transition: background 0.2s; }
    summary:hover { background: var(--surface-hover); color: var(--text); }
    summary::before { content: "→ "; color: var(--ep-gold); font-weight: bold; margin-right: 4px; display: inline-block; transition: transform 0.2s; }
    details[open] summary::before { transform: rotate(90deg); }
    summary:focus-visible { outline: 2px solid var(--ep-gold); }
    .sub { border-top: 1px solid var(--line); background: rgba(10, 15, 36, 0.3); }
    .sub > div { padding: 10px 14px; }
    .sub > div + div { border-top: 1px solid var(--line); }
    .sub .inst { color: var(--faint); font-size: 11px; font-family: var(--mono); }
    .sub .ref { font-family: var(--mono); font-size: 11px; margin-bottom: 2px; display: inline-block; }
    .sub .st { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; }
    .sub .ss { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
    .playhead { display: grid; grid-template-columns: 56px 1fr; gap: 0 14px; align-items: center; padding: 6px 0; margin: 4px 0; }
    .playhead .now { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--red); letter-spacing: .08em; text-transform: uppercase; }
    .playhead .line { height: 2px; background: var(--red); box-shadow: 0 0 8px rgba(239, 68, 68, 0.6); border-radius: 99px; }
    .newdot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10B981; margin-right: 8px; vertical-align: 1px; }
    .empty { padding: 64px 0; text-align: center; color: var(--muted); font-family: var(--mono); font-size: 13px; border: 1px dashed var(--line); border-radius: 8px; background: var(--surface); }
    footer { max-width: 640px; margin: 0 auto; padding: 0 20px 48px; font-family: var(--mono); font-size: 11px; color: var(--faint); line-height: 1.6; border-top: 1px solid var(--line); padding-top: 16px; }
    footer a { color: var(--muted); text-decoration: none; border-bottom: 1px dotted var(--muted); }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <h1>EBS <span>Rundown</span></h1>
    <div class="daynav">
      <button id="prev" aria-label="Previous day">‹</button>
      <span class="day" id="day"></span>
      <button id="next" aria-label="Next day">›</button>
    </div>
  </div>
  <div class="meta">
    <div class="chips" role="group" aria-label="Channel filter">
      <button class="chip" data-ch="ALL" aria-pressed="true">COMBINED</button>
      <button class="chip" data-ch="EBS" aria-pressed="false">EbS MAIN</button>
      <button class="chip" data-ch="EBS+" aria-pressed="false">EbS+</button>
    </div>
    <div class="updated" id="updated"></div>
  </div>
</header>

<main>
  <div class="tz">All times Brussels (CET/CEST)</div>
  <div id="list"></div>
</main>

<footer>
  Source Context: European Commission Audiovisual Service · Schedule Feed Data.<br>
  Independent curation tool · <a href="https://multimedia.europarl.europa.eu/en" target="_blank" rel="noopener">EP Multimedia Centre Reference Links</a>.<br>
  <span style="opacity: 0.75;">For internal/informal schedule reference usage. Not an official product of the European Parliament.</span>
</footer>

<script>
(() => {
  const EMBEDDED = {
    "generatedAt": new Date().toISOString(),
    "events": [] 
  };

  const TZ = "Europe/Brussels";
  const NEW_WINDOW_MS = 12 * 3600 * 1000;
  const NEW_FADE_MS = 150000;
  const NEW_HARD_CAP_MS = 3600000;

  const newShownAt = new Map();
  const newExpired = new Set();
  
  let pendingScroll = true;
  let pendingToday = false;
  let currentFeed = EMBEDDED;
  let currentFilter = "ALL";
  let dayIdx = 0;
  let availableDays = [];

  const evKey = (e) => `${e.start}|${e.channel}|${e.title}`;
  const dayKey = (d) => new Intl.DateTimeFormat("en-CA", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: TZ }).format(d);
  const fmtT = (d) => new Intl.DateTimeFormat("en-GB", { hour: "2-digit", minute: "2-digit", timeZone: TZ }).format(d);
  const fmtDayLong = (d) => new Intl.DateTimeFormat("en-GB", { weekday: "short", day: "2-digit", month: "short", timeZone: TZ }).format(d).toUpperCase();
  const esc = (s) => (s || "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const chName = (c) => c === "EBS" ? "EBS" : "EBS+";

  function durTxt(sec) {
    if (!sec) return "";
    const m = Math.round(sec / 60);
    return m >= 60 ? `${Math.floor(m / 60)}h${String(m % 60).padStart(2, "0")}` : `${m}′`;
  }

  function getStatusFlag(status) {
    if (status === "LIVE") return '<span class="flag live">LIVE</span>';
    if (status === "RECORDED" || status === "EDIT_RECORDED") return '<span class="flag rec">REC</span>';
    return '<span class="flag edit">EDIT</span>';
  }

  function createRefLine(s) {
    if (!s.ref) return "";
    const tag = s.inst ? ` <span class="inst">· ${esc(s.inst)}</span>` : "";
    if (s.mmc && s.mmc.startsWith("https://multimedia.europarl.europa.eu/")) {
      return `<div><a class="ref" href="${esc(s.mmc)}" target="_blank" rel="noopener">${esc(s.ref)} ↗</a>${tag}</div>`;
    }
    return `<div class="ref">${esc(s.ref)}${tag}</div>`;
  }

  function createSubItemsHTML(items, eventKey, isDetailsOpen) {
    const subs = (items || []).filter(s => s.title || s.summary);
    if (!subs.length) return "";
    const openAttr = isDetailsOpen ? "open" : "";
    const itemsHTML = subs.map(s => `
      <div>
        ${createRefLine(s)}
        <div class="st">${esc(s.title)}</div>
        ${s.summary && s.summary !== s.title ? `<div class="ss">${esc(s.summary)}</div>` : ""}
      </div>
    `).join("");

    return `
      <details ${openAttr} data-key="${esc(eventKey)}">
        <summary>${subs.length} Component Item${subs.length > 1 ? "s" : ""}</summary>
        <div class="sub">${itemsHTML}</div>
      </details>
    `;
  }

  function createEventHTML(e, now, isToday, openDetailsKeys) {
    const st = new Date(e.start);
    const en = new Date(st.getTime() + (e.durationSec || 0) * 1000);
    const onair = isToday && now >= st && now <= en && e.status === "LIVE";
    const past = en < now && !onair;
    
    let newDotHTML = "";
    if (e.firstSeen) {
      const k = evKey(e);
      const age = now - new Date(e.firstSeen);
      if (age >= 0 && age < NEW_WINDOW_MS && !newExpired.has(k)) {
        if (!newShownAt.has(k)) newShownAt.set(k, Date.now());
        const shownFor = Date.now() - newShownAt.get(k);
        const opacity = Math.max(0, 1 - shownFor / NEW_FADE_MS);
        if (opacity <= 0.02 || shownFor >= NEW_HARD_CAP_MS) {
          newExpired.add(k);
        } else {
          newDotHTML = `<span class="newdot" style="opacity:${opacity.toFixed(2)}" aria-label="New broadcast entry"></span>`;
        }
      }
    }

    const cls = `event${past ? " past" : ""}${onair ? " onair" : ""}${e.ep ? " ep" : ""}`;
    const epFlag = e.ep ? '<span class="flag epflag">EP</span>' : "";
    const langHTML = e.languages && e.languages.length > 1 ? `<div class="langs">${e.languages.join(" · ")}</div>` : "";
    const eventKey = evKey(e);
    const isDetailsOpen = openDetailsKeys.has(eventKey);

    return `
      <article class="${cls}">
        <div>
          <div class="time">${fmtT(st)}</div>
          <div class="dur">${durTxt(e.durationSec)}</div>
        </div>
        <div class="rail"><span class="node"></span></div>
        <div>
          <div class="flags">
            ${getStatusFlag(e.status)}
            <span class="flag ch-${e.channel === "EBS" ? "EBS" : "EBSplus"}">${chName(e.channel)}</span>
            ${epFlag}
          </div>
          <div class="title">${newDotHTML}${esc(e.title)}</div>
          ${langHTML}
          ${createSubItemsHTML(e.items, eventKey, isDetailsOpen)}
        </div>
      </article>
    `;
  }

  function rebuildDays() {
    availableDays = [...new Set(currentFeed.events.map(e => dayKey(new Date(e.start))))].sort();
    const todayK = dayKey(new Date());
    const want = availableDays.indexOf(todayK);
    dayIdx = want >= 0 ? want : 0;
  }

  function render() {
    const now = new Date();
    const todayK = dayKey(now);
    const selKey = availableDays[dayIdx];
    
    const evs = currentFeed.events.filter(e =>
      dayKey(new Date(e.start)) === selKey &&
      (currentFilter === "ALL" || chName(e.channel) === currentFilter)
    );
    const isToday = selKey === todayK;

    const dayEl = document.getElementById("day");
    if (selKey) {
      dayEl.textContent = fmtDayLong(new Date(selKey + "T12:00:00Z")) + (isToday ? " · TODAY" : "");
      dayEl.classList.toggle("today", isToday);
    }
    document.getElementById("prev").disabled = dayIdx <= 0;
    document.getElementById("next").disabled = dayIdx >= availableDays.length - 1;
    if (currentFeed.generatedAt) {
      document.getElementById("updated").textContent = "SYNC: " + fmtT(new Date(currentFeed.generatedAt));
    }

    const list = document.getElementById("list");
    const openDetailsKeys = new Set(
      Array.from(list.querySelectorAll("details[open]")).map(d => d.dataset.key)
    );

    if (!evs.length) {
      list.innerHTML = '<div class="empty">No transmission events scheduled for this channel profile.</div>';
      return;
    }

    let html = "";
    let playheadPlaced = !isToday;
    const playheadHTML = `<div class="playhead" aria-label="Current operational minute"><span class="now">${fmtT(now)} •</span><span class="line"></span></div>`;

    for (const e of evs) {
      const st = new Date(e.start);
      if (!playheadPlaced && st > now) {
        html += playheadHTML;
        playheadPlaced = true;
      }
      html += createEventHTML(e, now, isToday, openDetailsKeys);
    }
    
    if (isToday && !playheadPlaced) html += playheadHTML;
    list.innerHTML = html;

    if (pendingScroll) {
      pendingScroll = false;
      if (isToday) {
        const ph = list.querySelector(".playhead");
        if (ph) ph.scrollIntoView({ block: "center" });
      }
    }
  }

  async function refresh() {
    try {
      const r = await fetch(`feed.json?t=${Date.now()}`, { cache: "no-store" });
      if (r.ok) {
        const sel = availableDays[dayIdx];
        currentFeed = await r.json();
        rebuildDays();
        if (pendingToday) {
          pendingToday = false;
        } else {
          const keep = availableDays.indexOf(sel);
          if (keep >= 0) dayIdx = keep;
        }
      }
    } catch (_) {}
    render();
  }

  document.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", () => {
      currentFilter = btn.dataset.ch;
      document.querySelectorAll(".chip").forEach(x => x.setAttribute("aria-pressed", x === btn ? "true" : "false"));
      render();
    });
  });

  document.getElementById("prev").addEventListener("click", () => {
    if (dayIdx > 0) { dayIdx--; render(); }
  });

  document.getElementById("next").addEventListener("click", () => {
    if (dayIdx < availableDays.length - 1) { dayIdx++; render(); }
  });

  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
      pendingScroll = true;
      pendingToday = true;
      newShownAt.clear();
      newExpired.clear();
      refresh();
    }
  });

  rebuildDays();
  refresh();
  
  setInterval(refresh, 5 * 60 * 1000);
  setInterval(render, 60 * 1000);
})();
</script>
</body>
</html>
